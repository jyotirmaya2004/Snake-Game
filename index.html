<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Snake Game</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="icon.png" type="image/x-icon">
</head>
<body>
	<main>
		<div class="head">
			<h1><img src="icon.png" alt="">Snake Game</h1>
		</div>
		<section>
			<div class="infos">
				<div class="info">
					<h3>High Score : <span id="high-score">00</span></h3>
				</div>
				<div class="info">
					<h3>Score : <span id="score">00</span></h3>
				</div>
				<div class="info">
					<h3>Time : <span id="timer">00:00</span></h3>
				</div>
			</div>
			<div class="board">
			</div>
		</section>
		<div class="modal">
			<div class="start-game">
				<h1>Welcome to Snake Game!</h1>
				<button class="btn btn-start">Start Game</button>
			</div>
			<div class="game-over">
				<h1>Game Over!</h1>
				<button class="btn btn-restart">Restart Game</button>
			</div>
		</div>
	</main>
	<script src="script.js"></script>
</body>
</html>
